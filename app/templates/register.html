<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册账号 - Personal Blog</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .register-page {
      width: 100%;
      max-width: 420px;
    }

    .register-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      padding: 36px;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .brand p {
      color: #64748b;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #334155;
    }

    .form-group input {
      width: 100%;
      height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    .message {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .submit-button {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .submit-button:hover {
      background: #1d4ed8;
    }

    .submit-button:active {
      transform: translateY(1px);
    }

    .submit-button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .footer-text {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }

    .footer-text a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .register-card {
        padding: 28px 22px;
      }
    }
  </style>
</head>
<body>
  <main class="register-page">
    <section class="register-card">
      <div class="brand">
        <h1>创建账号</h1>
        <p>注册后即可登录个人博客后台</p>
      </div>

      <div id="message" class="message"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            id="username"
            name="username"
            type="text"
            placeholder="请输入用户名"
            minlength="3"
            maxlength="50"
            autocomplete="username"
            required
          />
          <p class="hint">3-50 个字符，建议使用英文、数字或下划线。</p>
        </div>

        <div class="form-group">
          <label for="email">邮箱</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="请输入邮箱"
            maxlength="255"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="nickname">昵称</label>
          <input
            id="nickname"
            name="nickname"
            type="text"
            placeholder="请输入展示昵称，可选"
            maxlength="80"
            autocomplete="nickname"
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="请输入密码"
            minlength="8"
            maxlength="128"
            autocomplete="new-password"
            required
          />
          <p class="hint">至少 8 位，建议包含字母、数字和符号。</p>
        </div>

        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input
            id="confirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="请再次输入密码"
            minlength="8"
            maxlength="128"
            autocomplete="new-password"
            required
          />
        </div>

        <button id="submitButton" class="submit-button" type="submit">注册</button>
      </form>

      <p class="footer-text">
        已有账号？<a href="/login">去登录</a>
      </p>
    </section>
  </main>

  <script>
    const form = document.querySelector("#registerForm");
    const message = document.querySelector("#message");
    const submitButton = document.querySelector("#submitButton");

    function showMessage(type, text) {
      message.className = `message show ${type}`;
      message.textContent = text;
    }

    function clearMessage() {
      message.className = "message";
      message.textContent = "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearMessage();

      const formData = new FormData(form);
      const username = formData.get("username").trim();
      const email = formData.get("email").trim();
      const nickname = formData.get("nickname").trim();
      const password = formData.get("password");
      const confirmPassword = formData.get("confirmPassword");

      if (!username || username.length < 3) {
        showMessage("error", "用户名至少需要 3 个字符。");
        return;
      }

      if (!email) {
        showMessage("error", "请输入邮箱。");
        return;
      }

      if (!password || password.length < 8) {
        showMessage("error", "密码至少需要 8 位。");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("error", "两次输入的密码不一致。");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "注册中...";

      try {
        const response = await fetch("/api/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            email,
            nickname: nickname || null,
            password
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.detail || data.message || "注册失败，请稍后再试。");
        }

        showMessage("success", "注册成功，正在跳转到登录页...");
        form.reset();

        setTimeout(() => {
          window.location.href = "/login";
        }, 1200);
      } catch (error) {
        showMessage("error", error.message || "注册失败，请稍后再试。");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "注册";
      }
    });
  </script>
</body>
</html>
